<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BAR-MASTER 2000 Pro - [Party_Planner.exe]</title>
    <style>
        /* --- STYLE RÉTRO WINDOWS 2000 --- */
        body {
            background-color: #3a6ea5; /* Le fameux fond d'écran bleu-vert mythique */
            font-family: "MS Sans Serif", "Tahoma", Arial, sans-serif;
            font-size: 12px;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .win2k-window {
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            box-shadow: 1px 1px 0px #000000;
            width: 650px;
            padding: 2px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1080d0);
            color: #ffffff;
            padding: 3px 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-text {
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .window-body {
            padding: 10px;
        }

        fieldset {
            border: 2px solid #808080;
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            margin-bottom: 10px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
            padding: 0 5px;
        }

        .form-group {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        label {
            width: 180px;
            display: inline-block;
        }

        input[type="number"], select {
            background-color: #ffffff;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 2px;
            font-family: inherit;
            font-size: 12px;
            box-sizing: border-box;
        }

        input[type="number"] {
            width: 80px;
        }

        select {
            width: 160px;
        }

        .btn-calc {
            width: 100%;
            background-color: #d4d0c8;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 6px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            box-shadow: 1px 1px 0px #000000;
        }

        .btn-calc:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            box-shadow: none;
            padding: 7px 5px 5px 7px;
        }

        /* Console Dos / Terminal pour les résultats */
        .console-output {
            background-color: #000000;
            color: #00ff00;
            font-family: "Courier New", Courier, monospace;
            font-size: 12px;
            padding: 10px;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            height: 260px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="win2k-window">
    <div class="title-bar">
        <span class="title-text">🍸 COCKTAIL BUDGET & SAFETY PLANNER v2.50</span>
        <span style="font-family: monospace; font-size: 10px; background: #d4d0c8; color: black; padding: 0 4px; border: 1px solid black; cursor: pointer;">X</span>
    </div>
    
    <div class="window-body">
        <fieldset>
            <legend>1. Paramètres de l'événement</legend>
            <div class="form-group">
                <label for="guests">Nombre d'invités :</label>
                <input type="number" id="guests" value="20" min="1">
            </div>
            <div class="form-group">
                <label for="drinks">Verres par personne :</label>
                <input type="number" id="drinks" value="4" min="1">
            </div>
        </fieldset>

        <fieldset>
            <legend>2. Configuration du Cocktail (Proportions globales)</legend>
            <div class="form-group">
                <label for="premade">Recettes d'usine :</label>
                <select id="premade" onchange="loadPremade()">
                    <option value="custom">-- Assemblage Manuel --</option>
                    <option value="cubalibre">Cuba Libre (1L / 4L)</option>
                    <option value="vodkaorange">Vodka Orange (1L / 3L)</option>
                    <option value="vodkapomme">Vodka Pomme (1L / 3L)</option>
                    <option value="vodkaenergy">Vodka Energy (1L / 3L)</option>
                </select>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #808080; border-bottom: 1px solid #ffffff; margin: 10px 0;">
            
            <div class="form-group">
                <label for="alcool">Alcool Principal :</label>
                <select id="alcool">
                    <option value="Bière">Bière</option>
                    <option value="Rhum">Rhum</option>
                    <option value="Vodka">Vodka</option>
                    <option value="Whisky">Whisky</option>
                </select>
                <label style="width: 120px; text-align: right; padding-right: 5px;" for="prop_alc">Proportion Alcool (L) :</label>
                <input type="number" id="prop_alc" value="1.0" step="0.1" min="0">
            </div>

            <div class="form-group">
                <label for="soft">Diluant / Soft :</label>
                <select id="soft" onchange="toggleSoftInput()">
                    <option value="N/A">N/A (Pas de soft)</option>
                    <option value="Cola">Cola</option>
                    <option value="Boisson énergisante">Boisson énergisante</option>
                    <option value="Jus d'orange">Jus d'orange</option>
                    <option value="Jus de pomme">Jus de pomme</option>
                    <option value="Eau Gazeuse">Eau Gazeuse</option>
                </select>
                <label style="width: 120px; text-align: right; padding-right: 5px;" for="prop_soft">Proportion Soft (L) :</label>
                <input type="number" id="prop_soft" value="3.0" step="0.1" min="0">
            </div>
        </fieldset>

        <button class="btn-calc" onclick="calculateData()">[ EXÉCUTER LE CALCUL ]</button>

        <fieldset>
            <legend>3. Rapport Système / Analyse de données</legend>
            <div class="console-output" id="console">--- SYSTEM READY ---
Veuillez configurer vos variables et cliquer sur Exécuter...</div>
        </fieldset>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURATION DES PRIX EN DUR (BASE DE DONNÉES)
    // ==========================================
    const PRICES = {
        // Alcools
        "Rhum": 13.79,
        "Vodka": 14.79,
        "Bière": 3.77,
        "Whisky": 15.85,
        // Softs
        "Cola": 1.40,
        "Jus d'orange": 0.97,
        "Eau Gazeuse": 0.22,
        "Boisson énergisante": 2.06,
        "Jus de pomme": 0.69
    };

    // Recettes d'usine basées sur des ratios globaux faciles (Ex: 1L pour 3L ou 4L)
    const PREMADE_COCKTAILS = {
        "cubalibre": { alcool: "Rhum", prop_alc: 1.0, soft: "Cola", prop_soft: 4.0 },
        "vodkaorange": { alcool: "Vodka", prop_alc: 1.0, soft: "Jus d'orange", prop_soft: 3.0 },
        "vodkapomme": { alcool: "Vodka", prop_alc: 1.0, soft: "Jus de pomme", prop_soft: 3.0 },
        "vodkaenergy": { alcool: "Vodka", prop_alc: 1.0, soft: "Boisson énergisante", prop_soft: 3.0 },
    };

    // Contenance arbitraire standard d'un verre de fête (25 cl soit 0.25 Litre)
    const CONTENANCE_VERRE = 0.25;

    function loadPremade() {
        const choice = document.getElementById("premade").value;
        if (choice !== "custom" && PREMADE_COCKTAILS[choice]) {
            const recipe = PREMADE_COCKTAILS[choice];
            document.getElementById("alcool").value = recipe.alcool;
            document.getElementById("prop_alc").value = recipe.prop_alc;
            document.getElementById("soft").value = recipe.soft;
            document.getElementById("prop_soft").value = recipe.prop_soft;
        }
        toggleSoftInput();
    }

    function toggleSoftInput() {
        const softValue = document.getElementById("soft").value;
        const propSoftInput = document.getElementById("prop_soft");
        if (softValue === "N/A") {
            propSoftInput.value = "0";
            propSoftInput.disabled = true;
        } else {
            if(propSoftInput.value == "0") propSoftInput.value = "3.0";
            propSoftInput.disabled = false;
        }
    }

    function calculateData() {
        // Récupération des entrées
        const guests = parseInt(document.getElementById("guests").value);
        const drinksPerPerson = parseInt(document.getElementById("drinks").value);
        const selectedAlc = document.getElementById("alcool").value;
        const propAlc = parseFloat(document.getElementById("prop_alc").value);
        const selectedSoft = document.getElementById("soft").value;
        let propSoft = parseFloat(document.getElementById("prop_soft").value);

        if (selectedSoft === "N/A") {
            propSoft = 0;
        }

        // Sécurité de division par zéro
        if (isNaN(guests) || isNaN(drinksPerPerson) || isNaN(propAlc) || isNaN(propSoft) || (propAlc + propSoft) === 0) {
            alert("Erreur critique : Données manquantes ou proportions à zéro.");
            return;
        }

        // --- CALCUL DES PARTS DE LA RECETTE ---
        const totalProportion = propAlc + propSoft; 
        const pourcentageAlcool = propAlc / totalProportion;
        const pourcentageSoft = propSoft / totalProportion;

        // Volume d'un seul verre décomposé (basé sur 0.25L de contenance)
        const volAlcPerGlass = CONTENANCE_VERRE * pourcentageAlcool;
        const volSoftPerGlass = CONTENANCE_VERRE * pourcentageSoft;

        // --- CALCULS LOGISTIQUES LOGICIEL ---
        const totalGlasses = guests * drinksPerPerson;
        const totalAlcRequired = totalGlasses * volAlcPerGlass;
        const totalSoftRequired = totalGlasses * volSoftPerGlass;

        // --- CALCULS FINANCIERS ---
        const costAlc = totalAlcRequired * PRICES[selectedAlc];
        const costSoft = selectedSoft !== "N/A" ? (totalSoftRequired * PRICES[selectedSoft]) : 0;
        const totalBudget = costAlc + costSoft;

        // --- ANALYSE UNITÉS D'ALCOOL (SANTÉ) ---
        // Bière estimée à 5°, Alcools forts (Rhum, Vodka, Whisky) estimés à 40°
        const degre = (selectedAlc === "Bière") ? 0.05 : 0.40;
        const grammesAlcoolParVerre = volAlcPerGlass * 1000 * degre * 0.8; // 0.8 = densité éthanol
        const unitsPerGlass = grammesAlcoolParVerre / 10; // 1 unité = 10g d'alcool pur
        const totalSessionUnits = unitsPerGlass * drinksPerPerson;

        // Logique d'alerte rétro personnalisée
        let alertStatus = "";
        if (totalSessionUnits === 0) {
            alertStatus = "⚠️ ALERTE : AUCUN ALCOOL INTRODUIT DANS LE SYSTÈME.";
        } else if (totalSessionUnits < 2.0) {
            alertStatus = "⚠️ ALERTE : Seuil de dynamisme critique (Risque de soirée trop calme !)";
        } else if (totalSessionUnits > 6.0) {
            alertStatus = "🚨 ALERTE ROUGE : Surconsommation critique ! Risque sanitaire élevé.";
        } else {
            alertStatus = "✅ STATUT : Consommation logique, conforme aux normes (Modérée).";
        }

        // --- ENCOSTRAGE DU RAPPORT TEXTE ---
        const pad = (str, len) => str.padEnd(len, ' ');
        
        let softRequiredText = selectedSoft !== "N/A" ? `${totalSoftRequired.toFixed(2)} Litres` : "0.00 Litres (N/A)";
        let softCostText = selectedSoft !== "N/A" ? `${costSoft.toFixed(2)} EUR (Tarif : ${PRICES[selectedSoft].toFixed(2)}€/L)` : "0.00 EUR";

        const report = `===========================================================
  RAPPORT DE PLANIFICATION DE SOIRÉE - RETRO_CALC v2.50
===========================================================
[RECETTE CONFIGURÉE]
Ratio volumétrique    : ${propAlc} L d'alcool pour ${propSoft} L de soft
Profil du verre       : ${(pourcentageAlcool * 100).toFixed(0)}% Alcool / ${(pourcentageSoft * 100).toFixed(0)}% Soft (Sur base de 25cl)

[PARAMÈTRES LOGISTIQUES]
Nombre d'invités      : ${guests} personnes
Verres par personne   : ${drinksPerPerson} verres
Volume total produit  : ${totalGlasses} verres à servir

[VOLUMES MATIÈRES PREMIÈRES REQUIS]
-> TOTAL ${pad(selectedAlc.toUpperCase(), 12)} : ${totalAlcRequired.toFixed(2)} Litres
-> TOTAL ${pad(selectedSoft.toUpperCase(), 12)} : ${softRequiredText}

[ANALYSE BUDGÉTAIRE SEGMENTÉE]
> Coût ${pad(selectedAlc, 14)}: ${costAlc.toFixed(2)} EUR (Tarif : ${PRICES[selectedAlc].toFixed(2)}€/L)
> Coût ${pad(selectedSoft, 14)}: ${softCostText}
-----------------------------------------------------------
>> BUDGET GLOBAL REQUIS   : ${totalBudget.toFixed(2)} EUR

[DIAGNOSTIC SANTÉ & PRÉVENTION]
Unités d'alcool cumulées / personne : ${totalSessionUnits.toFixed(1)} unités
${alertStatus}
===========================================================`;

        document.getElementById("console").textContent = report;
    }
</script>
</body>
</html>
